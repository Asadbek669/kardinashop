/* =========================

========================= */
const slider = document.createElement("div");
slider.className = "slider";

categories.forEach(cat => {
  const card = document.createElement("div");
  card.className = "slider-card";

  card.innerHTML = `
    <img src="${cat.poster}">
    <div class="name">${cat.name}</div>
  `;

  card.onclick = () => {
    console.log("CATEGORY CLICK:", cat.id);

    if (!cat.id) {
      alert("ID yo‘q!");

    }

  slider.appendChild(card);
});

app.appendChild(slider);

/* =========================
   SHORTS HEADER
========================= */
const shortsHeader = document.createElement("div");
shortsHeader.className = "section-header";

shortsHeader.innerHTML = `
  <h2 class="title">Shorts</h2>
  <div class="see-all" onclick="goShortsPage()">
    Barchasini ko‘rish <span>›</span>
  </div>
`;

app.appendChild(shortsHeader);

/* =========================
   SHORTS SLIDER
========================= */
/* =========================
   SHORTS SLIDER (YANGILANGAN)
========================= */
const shortsSlider = document.createElement("div");
shortsSlider.className = "shorts-slider";

// Video manzillari (shorts.html dagi kabi)
const shortVideos = [
  "https://www.youtube.com/shorts/Qr7jlgYBwbI",
  "https://www.youtube.com/shorts/ZgvroXxpfuU",
  "https://youtube.com/shorts/GcYG6JKDkZE",
  "https://youtube.com/shorts/WmOFDI0sAmY"
];

// ID ni ajratib olish funksiyasi
function getVideoId(url) {
  return url.split("/shorts/")[1].split("?")[0];
}

shortVideos.forEach((url, index) => {
  const id = getVideoId(url);
  const item = document.createElement("div");
  item.className = "short-card";

  item.innerHTML = `
    <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
    <div class="short-title">Short ${index + 1}</div>
  `;

  // Bosilganda modalni ochish
  item.onclick = () => {
    const modal = document.getElementById("videoModal");
    const frame = document.getElementById("videoFrame");
    frame.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0`;
    modal.style.display = "block";
  };

  shortsSlider.appendChild(item);
});

app.appendChild(shortsSlider);

// Modalni yopish funksiyasi
function closeVideo() {
  document.getElementById("videoModal").style.display = "none";
  document.getElementById("videoFrame").src = "";
}

/* =========================
   BANNER
========================= */
const banner = document.getElementById("banner");

const banners = [
  "🔥 Eng sifatli TO'QIMA qoplamalar",
  "🚗 Barcha avtomobillar uchun tayyorlanadi",
  "💎 Zamonaviy va bardoshli material",
  "📦 Buyurtma asosida tez yetkazib berish"
];

let i = 0;

function changeBanner() {
  if (!banner) return;

  banner.style.opacity = "0";

  setTimeout(() => {
    banner.innerText = banners[i];
    banner.style.opacity = "1";
    i = (i + 1) % banners.length;
  }, 300);
}

changeBanner();
setInterval(changeBanner, 4000);

/* =========================
   NAVIGATION
========================= */
function goCategoryPage() {
  window.location.href = "category/index.html";
}

function goShortsPage() {
  window.location.href = "shorts.html";
}

function goCart() {
  window.location.href = "cart.html";
}

/* =========================
   CART (FIXED - ONLY ONCE)
========================= */
function updateCartUI() {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];

  let total = 0;
  cart.forEach(item => {
    total += item.count || 0;
  });

  const el = document.getElementById("cartCount");
  if (el) el.innerText = total;
}

/* INIT */
document.addEventListener("DOMContentLoaded", updateCartUI);

/* LIVE UPDATE */
window.addEventListener("storage", updateCartUI);
window.addEventListener("cartUpdated", updateCartUI);
setInterval(updateCartUI, 1000);
</script>
