<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Home</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header{
  padding:4px;
  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);

  border-bottom:1px solid rgba(255,255,255,0.06);
}

/* TITLE */
.title{
  margin:15px;
  font-size:18px;
}


/* BANNER */
.banner{
  margin:15px;
  height:160px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;

  color:#eaeaea;
  font-weight:600;
  font-size:17px;

  background:linear-gradient(135deg,
    rgba(0,255,153,0.15),
    rgba(0,194,255,0.12)
  );

  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.4),
    inset 0 0 20px rgba(0,255,153,0.05);

  transition:0.5s ease;
}

/* INFO CARD */
.info-card{
  margin:15px;
  padding:15px;
  border-radius:16px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);

  border:1px solid rgba(255,255,255,0.08);
  color:#ddd;
}

.info-card h3{
  margin:0 0 10px;
  color:#00ff99;
}

.info-card p{
  margin:6px 0;
  font-size:13px;
  line-height:1.5;
}

.info-card a{
  display:inline-block;
  margin-top:10px;
  color:#00c2ff;
  text-decoration:none;
  font-weight:bold;
}

/* SLIDER */
.slider{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:15px;
}

.slider-card{
  min-width:140px;
  background:#1a1a1a;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.05);
  transition:0.2s;
}

.slider-card:hover{
  transform:scale(1.05);
}

.slider-card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.slider-card .name{
  padding:8px;
  font-size:13px;
  text-align:center;
}

/* FOOTER */
.footer{
  margin-top:20px;
  padding:15px;
  text-align:center;
  font-size:12px;
  color:#aaa;
  border-top:1px solid rgba(255,255,255,0.05);
}
.logo{
  height:40px;   /* logo kattaligi */
  object-fit:contain;
}

.section-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:15px;
}

/* TITLE */
.title{
  font-size:20px;
  font-weight:700;
  color:#eaeaea;
  letter-spacing:0.3px;

  position:relative;
}

/* TITLE underline glow */
.title::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-6px;
  width:40%;
  height:2px;
  background:linear-gradient(90deg,#00ff99,#00c2ff);
  border-radius:10px;
}

/* SEE ALL BUTTON */
.see-all{
  font-size:13px;
  color:#aaa;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:4px;

  transition:0.2s;
}

.see-all span{
  font-size:16px;
  transition:0.2s;
}

/* hover effect */
.see-all:hover{
  color:#00ff99;
}

.see-all:hover span{
  transform:translateX(3px);
}
</style>
</head>

<body>

/* SLIDER */
const slider = document.createElement("div");
slider.className = "slider";

categories.forEach(cat => {

</body>
</html>
