<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  font-family:Arial;
  color:white;
}

/* HEADER */
.header{
  padding:15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.back{
  color:#00ff99;
  cursor:pointer;
  font-size:14px;
}

/* LIST */
.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  width:100%;
  height:220px;
  border-radius:14px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  background:#1a1a1a;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PLAY */
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

/* MODAL */
#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  z-index:9999;
}

#frame{
  width:100%;
  height:100%;
  border:none;
}

.close{
  position:absolute;
  top:10px;
  right:10px;
  font-size:28px;
  color:white;
  cursor:pointer;
  z-index:10000;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="back" onclick="history.back()">⬅ Orqaga</div>
  <div>Shorts</div>
</div>

<!-- LIST -->
<div class="container" id="list"></div>

<!-- MODAL -->
<div id="modal">
  <div class="close" onclick="closeVideo()">✕</div>
  <iframe id="frame"
    allow="autoplay; fullscreen"
    allowfullscreen>
  </iframe>
</div>

<script>

// 🔥 Shorts videolar
const shorts = [
  "https://www.youtube.com/shorts/Qr7jlgYBwbI",
  "https://www.youtube.com/shorts/ZgvroXxpfuU"
];

// ID tozalash function (ENG MUHIM FIX)
function getVideoId(url){
  return url
    .split("/shorts/")[1]
    .split("?")[0]
    .trim();
}

// Open video
function openVideo(id){
  const modal = document.getElementById("modal");
  const frame = document.getElementById("frame");

  // 🔥 ERROR 153 FIX
  frame.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0`;

  modal.style.display = "block";
}

// Close video
function closeVideo(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("frame").src = "";
}

// Render list
const list = document.getElementById("list");

shorts.forEach(url => {
  const id = getVideoId(url);

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
    <div class="play">▶</div>
  `;

  card.onclick = () => openVideo(id);

  list.appendChild(card);
});

</script>

</body>
</html>
