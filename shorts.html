<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  font-family:Arial;
  color:white;
}

/* ================= HEADER ================= */
.header{
  position:sticky;
  top:0;
  z-index:10;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:14px 16px;

  background:rgba(20,20,20,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.header .title{
  font-weight:bold;
  font-size:18px;
  letter-spacing:0.5px;
}

.back{
  color:#00ff99;
  cursor:pointer;
  font-size:14px;
}

/* ================= GRID ================= */
.container{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:12px;
  padding:12px;
}

/* ================= CARD (9:16) ================= */
.card{
  position:relative;
  width:100%;
  aspect-ratio:9/16;
  border-radius:14px;
  overflow:hidden;
  background:#1a1a1a;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

/* THUMB */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PLAY ICON */
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);

  width:55px;
  height:55px;
  border-radius:50%;
  background:rgba(0,0,0,0.5);

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:24px;
}

/* ================= MODAL ================= */
#modal{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  z-index:9999;
}

#frame{
  width:100%;
  height:100%;
  border:none;
}

.close{
  position:absolute;
  top:12px;
  right:12px;
  font-size:28px;
  color:white;
  cursor:pointer;
  z-index:10000;
}

.header{
  position:sticky;
  top:0;
  z-index:10;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:12px 14px;

  background:rgba(20,20,20,0.65);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.06);
}

/* BACK BUTTON */
.back{
  display:flex;
  align-items:center;
  gap:8px;

  padding:8px 12px;

  border-radius:999px;
  background:rgba(255,255,255,0.06);

  cursor:pointer;
  transition:0.2s;
}

.back:hover{
  background:rgba(255,255,255,0.12);
}

.back span{
  font-size:13px;
  font-weight:500;
  color:white;
}

/* TITLE */
.title{
  font-size:16px;
  font-weight:700;
  letter-spacing:0.5px;
  color:white;
}

/* RIGHT ICON */
.right{
  width:36px;
  height:36px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:50%;
  background:rgba(255,255,255,0.06);

  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <!-- BACK BUTTON -->
  <div class="back" onclick="goHome()">
    <!-- SVG arrow -->
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M15 18l-6-6 6-6"
        stroke="white"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
    </svg>

    <span>Orqaga</span>
  </div>

  <!-- TITLE -->
  <div class="title">
    Shorts
  </div>

  <!-- RIGHT ICON (optional) -->
  <div class="right">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M12 2v20M2 12h20"
        stroke="white"
        stroke-width="2"
        stroke-linecap="round"/>
    </svg>
  </div>

</div>

<!-- GRID -->
<div class="container" id="list"></div>

<!-- VIDEO MODAL -->
<div id="modal">
  <div class="close" onclick="closeVideo()">✕</div>
  <iframe id="frame" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<script>

// 🎬 Shorts list
const shorts = [
  "https://www.youtube.com/shorts/Qr7jlgYBwbI",
  "https://www.youtube.com/shorts/ZgvroXxpfuU",
  "https://youtube.com/shorts/GcYG6JKDkZE?si=ay84yFM6HqppQKex",
  "https://youtube.com/shorts/WmOFDI0sAmY?si=rRJCH_GgBFJKGK5-"
];

// ID clean function
function getVideoId(url){
  return url.split("/shorts/")[1].split("?")[0];
}

// open video
function openVideo(id){
  const modal = document.getElementById("modal");
  const frame = document.getElementById("frame");

  frame.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0`;

  modal.style.display = "block";
}

// close video
function closeVideo(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("frame").src = "";
}

// render grid
const list = document.getElementById("list");

shorts.forEach(url => {
  const id = getVideoId(url);

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
    <div class="play">▶</div>
  `;

  card.onclick = () => openVideo(id);

  list.appendChild(card);
});


function goHome(){
  history.back();
}
</script>

</body>
</html>
