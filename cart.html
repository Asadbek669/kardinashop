<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Savatcha</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
}

/* TOPBAR */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(20,20,20,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 1000;
}

.back-btn {
  position: absolute;
  left: 12px;
  width: 40px;
  height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  font-size: 20px;
  transition: 0.2s;
}

.back-btn:active {
  background: rgba(255,255,255,0.15);
  transform: scale(0.95);
}

.title {
  font-size: 17px;
  font-weight: 600;
}

/* CART LIST */
.cart-list {
  margin-top: 70px;
  margin-bottom: 100px;
}

.empty-cart {
  text-align: center;
  margin-top: 120px;
  color: #666;
  font-size: 16px;
}

/* CARD ITEM */
.cart-item {
  display: flex;
  gap: 14px;
  padding: 14px;
  border-bottom: 1px solid #222;
  background: #0f0f0f;
}

.item-image {
  width: 70px;
  height: 70px;
  border-radius: 12px;
  object-fit: cover;
  background: #1a1a1a;
}

.item-info {
  flex: 1;
}

.item-name {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 4px;
}

.item-model {
  font-size: 12px;
  color: #00ff99;
  margin-bottom: 4px;
}

.item-price {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 8px;
}

/* COUNTER */
.counter {
  display: inline-flex;
  align-items: center;
  background: #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
  margin-top: 4px;
}

.counter-btn {
  width: 34px;
  height: 34px;
  border: none;
  background: #111;
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.1s;
}

.counter-btn:active {
  background: #222;
  transform: scale(0.95);
}

.counter-input {
  width: 50px;
  text-align: center;
  border: none;
  background: #1a1a1a;
  color: white;
  font-size: 15px;
  font-weight: 500;
  padding: 8px 0;
}

.counter-input:focus {
  outline: none;
}

.item-sum {
  font-size: 14px;
  font-weight: 700;
  color: #00ff99;
  margin-top: 8px;
}

.remove-btn {
  background: none;
  border: none;
  color: #ff5555;
  font-size: 22px;
  cursor: pointer;
  padding: 0 8px;
  transition: 0.1s;
}

.remove-btn:active {
  transform: scale(0.9);
  opacity: 0.7;
}

/* BOTTOM BAR */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 14px 18px;
  background: rgba(15,15,15,0.95);
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid #222;
  z-index: 100;
}

.total-price {
  font-size: 16px;
  font-weight: 600;
  color: white;
}

.total-price span {
  color: #00ff99;
  font-size: 18px;
}

.send-btn {
  padding: 12px 22px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  background: linear-gradient(135deg, #00ff99, #00c2ff);
  color: #000;
  border: none;
  transition: 0.2s;
  box-shadow: 0 4px 12px rgba(0,255,153,0.25);
}

.send-btn:active {
  transform: scale(0.96);
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(5px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.modal-content {
  width: 90%;
  max-width: 330px;
  background: #1a1a1a;
  padding: 24px 20px;
  border-radius: 24px;
  border: 1px solid #333;
  text-align: center;
}

.modal-title {
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 18px;
  font-weight: 600;
}

.phone-input {
  width: 100%;
  height: 48px;
  padding: 0 14px;
  border-radius: 14px;
  border: none;
  outline: none;
  background: #111;
  color: white;
  font-size: 16px;
  margin-bottom: 18px;
  text-align: center;
  letter-spacing: 0.5px;
}

.confirm-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(90deg, #00ff99, #00c2ff);
  color: #000;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: 0.2s;
}

.confirm-btn:active {
  transform: scale(0.97);
}

.cancel-modal {
  margin-top: 12px;
  color: #888;
  font-size: 13px;
  cursor: pointer;
  display: inline-block;
  padding: 6px 12px;
}

.cancel-modal:active {
  color: #aaa;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="back-btn" onclick="history.back()">❮</div>
  <div class="title">Savatcha</div>
</div>

<div id="cartList" class="cart-list"></div>

<div class="bottom-bar">
  <div class="total-price">Jami: <span id="totalPrice">0 so'm</span></div>
  <button class="send-btn" onclick="showPhoneModal()">Buyurtma berish</button>
</div>

<!-- MODAL -->
<div id="phoneModal" class="modal">
  <div class="modal-content">
    <div class="modal-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00ff99" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.08 4.18 2 2 0 0 1 4.06 2h3a2 2 0 0 1 2 1.72c.12.86.33 1.7.61 2.5a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.58-1.13a2 2 0 0 1 2.11-.45c.8.28 1.64.49 2.5.61A2 2 0 0 1 22 16.92z"/>
      </svg>
      Telefon raqam
    </div>
    
    <input id="phoneInput" class="phone-input" type="tel" placeholder="+998 __ ___ __ __" value="+998 ">
    
    <button class="confirm-btn" onclick="confirmOrder()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
      YUBORISH
    </button>
    
    <div class="cancel-modal" onclick="closeModal()">Bekor qilish</div>
  </div>
</div>

<script src="data.js"></script>
<script>
// ================= GLOBAL =================
let cart = [];

// ================= HELPERS =================
function loadCart() {
  cart = JSON.parse(localStorage.getItem('cart')) || [];
}

function saveCart() {
  localStorage.setItem('cart', JSON.stringify(cart));
}

function formatSum(value) {
  return value.toLocaleString('uz-UZ') + " so'm";
}

// ================= RENDER =================
function renderCart() {
  const container = document.getElementById('cartList');
  const totalSpan = document.getElementById('totalPrice');
  
  if (!cart.length) {
    container.innerHTML = '<div class="empty-cart">🛒 Savatcha bo‘sh</div>';
    if (totalSpan) totalSpan.innerText = '0 so\'m';
    return;
  }
  
  let total = 0;
  let html = '';
  
  cart.forEach((item, index) => {
    // Price ni to'g'ri olish (number yoki string bo'lishi mumkin)
    let priceValue = 0;
    if (typeof item.price === 'number') {
      priceValue = item.price;
    } else if (typeof item.price === 'string') {
      const match = item.price.match(/(\d[\d\s]*)/);
      if (match) priceValue = parseInt(match[0].replace(/\s/g, ''));
    } else if (item.priceText) {
      const match = item.priceText.match(/(\d[\d\s]*)/);
      if (match) priceValue = parseInt(match[0].replace(/\s/g, ''));
    }
    
    const count = item.count || 1;
    const sum = priceValue * count;
    total += sum;
    
    const priceDisplay = item.priceText || formatSum(priceValue);
    const modelHtml = item.modelName 
      ? `<div class="item-model">${item.modelName}</div>`
      : (item.model ? `<div class="item-model">🚗 ${item.model.toUpperCase()}</div>` : '');
    
    html += `
      <div class="cart-item" data-index="${index}">
        <img class="item-image" src="${item.poster}" onerror="this.src='https://placehold.co/70x70?text=No+Image'">
        
        <div class="item-info">
          <div class="item-name">${escapeHtml(item.name)}</div>
          ${modelHtml}
          <div class="item-price">${priceDisplay}</div>
          
          <div class="counter">
            <button class="counter-btn" onclick="changeCount(${index}, -1)">−</button>
            <input class="counter-input" type="number" min="1" value="${count}" onchange="setCount(${index}, this.value)">
            <button class="counter-btn" onclick="changeCount(${index}, 1)">+</button>
          </div>
          
          <div class="item-sum">${formatSum(sum)}</div>
        </div>
        
        <button class="remove-btn" onclick="removeItem(${index})">🗑</button>
      </div>
    `;
  });
  
  container.innerHTML = html;
  if (totalSpan) totalSpan.innerText = formatSum(total);
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// ================= CART ACTIONS =================
function changeCount(index, delta) {
  if (!cart[index]) return;
  const newCount = (cart[index].count || 1) + delta;
  if (newCount < 1) return;
  cart[index].count = newCount;
  saveCart();
  renderCart();
}

function setCount(index, value) {
  if (!cart[index]) return;
  let newCount = parseInt(value);
  if (isNaN(newCount) || newCount < 1) newCount = 1;
  cart[index].count = newCount;
  saveCart();
  renderCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  saveCart();
  renderCart();
}

// ================= MODAL =================
function showPhoneModal() {
  if (!cart.length) {
    alert("Savatcha bo'sh!");
    return;
  }
  document.getElementById('phoneModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('phoneModal').style.display = 'none';
  const phoneInput = document.getElementById('phoneInput');
  if (phoneInput) phoneInput.value = '+998 ';
}

// Telefon formatlash
function formatPhone(input) {
  let numbers = input.value.replace(/\D/g, '');
  if (!numbers.startsWith('998')) numbers = '998';
  numbers = numbers.slice(0, 12);
  
  let formatted = '+998 ';
  if (numbers.length > 3) formatted += numbers.slice(3, 5);
  if (numbers.length > 5) formatted += ' ' + numbers.slice(5, 8);
  if (numbers.length > 8) formatted += ' ' + numbers.slice(8, 10);
  if (numbers.length > 10) formatted += ' ' + numbers.slice(10, 12);
  
  input.value = formatted;
}

// ================= CONFIRM ORDER =================
async function confirmOrder() {
  const phoneInput = document.getElementById('phoneInput');
  let numbers = phoneInput.value.replace(/\D/g, '');

  if (numbers.length !== 12) {
    alert("📞 Telefon raqam noto'g'ri! (+998 XX XXX XX XX)");
    return;
  }

  const phone = '+' + numbers;

  if (!cart.length) {
    alert("🛒 Savatcha bo'sh!");
    return;
  }

  // Buyurtma matnini tayyorlash
  let total = 0;
  let orderText = "🛍 *YANGI BUYURTMA* 🛍\n\n";
  orderText += "━ ━ ━ ━ ━ ━ ━ ━ ━\n\n";
  
  let itemNumber = 1;
  
  for (const item of cart) {
    // Narxni to'g'ri olish
    let priceValue = 0;
    if (typeof item.price === 'number') {
      priceValue = item.price;
    } else if (typeof item.price === 'string') {
      const match = item.price.match(/(\d[\d\s]*)/);
      if (match) priceValue = parseInt(match[0].replace(/\s/g, ''));
    } else if (item.basePrice) {
      priceValue = item.basePrice;
    }
    
    const count = item.count || 1;
    const sum = priceValue * count;
    total += sum;
    
    // Formatlangan narxlar
    const formattedPrice = priceValue.toLocaleString('uz-UZ') + " so'm";
    const formattedSum = sum.toLocaleString('uz-UZ') + " so'm";
    
    orderText += `📦 *${itemNumber}. ${item.name}*\n`;
    orderText += `   💰 Narxi: ${formattedPrice}\n`;
    orderText += `   🔢 Soni: ${count} ta\n`;
    orderText += `   💵 Jami: ${formattedSum}\n`;
    orderText += `   🖼 Rasm: ${item.poster}\n\n`;
    
    itemNumber++;
  }
  
  orderText += "━ ━ ━ ━ ━ ━ ━ ━ ━\n\n";
  orderText += `💰 *UMUMIY SUMMA:* ${total.toLocaleString('uz-UZ')} so'm\n`;
  orderText += `📱 *Telefon:* ${phone}\n\n`;
  orderText += "━ ━ ━ ━ ━ ━ ━ ━ ━\n";
  orderText += "✅ Buyurtma qabul qilindi!";

  // Telegram bot sozlamalari
  const BOT_TOKEN = "8782268946:AAEFcwmQNZxd0fefc_eQRTUKd-IqzYuA-AY";
  const CHAT_ID = "-1003703851469";

  try {
    // 1. AVVAL RASMLARNI JO'NATAMIZ (media group sifatida)
    const mediaGroup = [];
    
    for (let i = 0; i < cart.length; i++) {
      const item = cart[i];
      if (item.poster && item.poster.startsWith('http')) {
        mediaGroup.push({
          type: "photo",
          media: item.poster,
          caption: i === 0 ? orderText : undefined // Faqat birinchi rasmga matn qo'shamiz
        });
      }
    }
    
    // Agar rasm bo'lsa, media group jo'natamiz
    if (mediaGroup.length > 0) {
      await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMediaGroup`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: CHAT_ID,
          media: mediaGroup
        })
      });
    } else {
      // Rasm bo'lmasa, faqat matn jo'natamiz
      await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: CHAT_ID,
          text: orderText,
          parse_mode: "Markdown"
        })
      });
    }
    
    // 2. TELEFON RAQAMGA HAM SMS YUBORISH (ixtiyoriy)
    // Buning uchun backend kerak, hozircha o'tkazib yuboramiz
    
    alert("✅ Buyurtma muvaffaqiyatli yuborildi!\n\nOperator siz bilan bog'lanadi.");
    
    // Savatchani tozalash
    localStorage.removeItem('cart');
    cart = [];
    renderCart();
    closeModal();
    
    // 3 soniyadan keyin oldingi sahifaga qaytish
    setTimeout(() => {
      window.location.href = "../index.html";
    }, 2000);
    
  } catch (err) {
    console.error("Xatolik:", err);
    alert("❌ Xatolik yuz berdi. Qayta urinib ko'ring.");
  }
}
// ================= INIT =================
loadCart();
renderCart();

// Input formatting
const phoneInput = document.getElementById('phoneInput');
if (phoneInput) {
  phoneInput.addEventListener('input', function() { formatPhone(this); });
}

// LocalStorage o'zgarishini kuzatish
window.addEventListener('storage', function(e) {
  if (e.key === 'cart') {
    loadCart();
    renderCart();
  }
});

window.addEventListener('focus', function() {
  loadCart();
  renderCart();
});
</script>
</body>
</html>
