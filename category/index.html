<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Kardina</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* TOP SLIDER */
.topbar{
  position:fixed;
  top:50px;
  width:100%;
  background:#1a1a1a;
  z-index:10;
  padding:10px 0;
}

.slider{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:0 10px;
}

.cat{
  flex-shrink:0;
  padding:10px 14px;
  background:#2a2a2a;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
}

.cat.active{
  background:#00ff99;
  color:black;
}

/* FEED */
#feed{
  padding-top:70px;
}

/* CATEGORY HEADER */
.section-title{
  position:sticky;
  top:50px;
  background:#0f0f0f;
  padding:12px;
  font-weight:bold;
  font-size:16px;
  z-index:5;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#1c1c1c;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.info{
  padding:6px;
}

.name{
  font-size:14px;
  font-weight:600;
}

.price{
  color:#00ff99;
  font-size:12px;
  margin-top:2px;
}

.desc{
  font-size:11px;
  color:#aaa;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:1;
  -webkit-box-orient:vertical;
}

html{
  scroll-behavior: smooth;
}

.card{
  position:relative;
}

/* Cart button styles */
.cart-btn{
  position:fixed;
  bottom:80px;
  right:15px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:linear-gradient(135deg,#00ff99,#00c2ff);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:999;
  box-shadow:0 8px 20px rgba(0,255,153,0.3);
  transition:0.3s;
}

.cart-count{
  position:absolute;
  top:-5px;
  right:-5px;
  background:#ff3b3b;
  color:#fff;
  font-size:12px;
  width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}
</style>
</head>

<body>
<div style="
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  display:flex;
  align-items:center;
  padding:0 15px;
  z-index:20;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.05);
">

  <div onclick="goHome()" style="
    width:36px;
    height:36px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    background:#2a2a2a;
    cursor:pointer;
    font-size:18px;
  ">
    ❮
  </div>

  <div style="
    margin-left:12px;
    font-size:16px;
    font-weight:600;
    letter-spacing:0.5px;
  ">
    Orqaga
  </div>

</div>
<div class="topbar">
  <div class="slider" id="slider"></div>
</div>

<div id="feed"></div>

<script src="../data.js"></script>
<script>
const feed = document.getElementById("feed");
const slider = document.getElementById("slider");

let activeIndex = 0;
let sections = [];

function goHome(){
  window.location.href = "../index.html";
}

// Har bir mahsulot uchun bitta aniq narxni olish
function getItemPrice(item) {
  if (item.price) {
    if (typeof item.price === 'string') return item.price;
    if (typeof item.price === 'number') return item.price.toLocaleString("uz-UZ") + " so'm";
  }
  if (item.basePrice) {
    return item.basePrice.toLocaleString("uz-UZ") + " so'm";
  }
  return "Narx yo'q";
}

/* RENDER SLIDER */
function renderSlider(){
  slider.innerHTML="";

  categories.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="cat "+(i===activeIndex?"active":"");
    el.innerText=c.name;

    el.onclick = () => {
      activeIndex = i;
      const targetElement = document.getElementById(c.id);
      if (targetElement) {
        smoothScrollTo(targetElement);
      }
      updateSlider();
    };

    slider.appendChild(el);
  });
}

/* RENDER FEED */
function renderFeed(){
  feed.innerHTML = "";

  categories.forEach(cat => {
    const section = document.createElement("div");
    section.className = "section";
    section.id = cat.id;

    section.innerHTML = `
      <div class="section-title">${cat.name}</div>
    `;

    const grid = document.createElement("div");
    grid.className = "grid";

    const hideAddBtn = cat.id !== "onix" && cat.id !== "tracker";

    cat.items.forEach(item => {

      const card = document.createElement("div");
      card.className = "card";

      card.onclick = (e) => {
        if (e.target.classList && e.target.classList.contains('add-btn')) return;
        window.location.href = `detail/index.html?cat=${cat.id}&id=${item.id}`;
      };

      const itemPrice = getItemPrice(item);

      card.innerHTML = `
        <img src="${item.poster}">
        <div class="info">
          <div style="display:flex; align-items:center; justify-content:space-between;">
            <div class="name">${item.name}</div>

            ${!hideAddBtn ? `
              <button class="add-btn" onclick="event.stopPropagation(); addToCart(${JSON.stringify(item).replace(/"/g,'&quot;')})"
              style="
                width:28px;
                height:28px;
                border-radius:6px;
                background:#00ff99;
                border:none;
                font-size:16px;
                font-weight:bold;
                cursor:pointer;
                display:flex;
                align-items:center;
                justify-content:center;
              ">
                +
              </button>
            ` : ``}

          </div>

          <div class="price">${itemPrice}</div>
          <div class="desc">${item.desc || (cat.id === "toqima" ? "To'qima qoplamalar" : "Sifatli qoplamalar")}</div>
        </div>
      `;

      grid.appendChild(card);
    });

    section.appendChild(grid);
    feed.appendChild(section);
  });

  sections = [...document.querySelectorAll(".section")];
}

/* ACTIVE CATEGORY DETECT */
window.addEventListener("scroll",()=>{
  let currentIndex=0;

  sections.forEach((sec,i)=>{
    const top=sec.getBoundingClientRect().top;
    if(top < window.innerHeight/2){
      currentIndex=i;
    }
  });

  if(currentIndex!==activeIndex){
    activeIndex=currentIndex;
    updateSlider();
  }
});

/* UPDATE SLIDER UI */
function updateSlider(){
  document.querySelectorAll(".cat").forEach((c,i)=>{
    c.classList.toggle("active",i===activeIndex);
  });
}

function smoothScrollTo(element){
  const y = element.getBoundingClientRect().top + window.pageYOffset - 110;
  window.scrollTo({
    top: y,
    behavior: "smooth"
  });
}

/* Savatcha funksiyalari */
function updateCartUI(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let total = 0;
  cart.forEach(i => total += i.count);
  const cartCountSpan = document.getElementById("cartCount");
  if(cartCountSpan) cartCountSpan.innerText = total;
}

function addToCart(item){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let found = cart.find(i => i.id === item.id);
  if(found){
    found.count += 1;
  }else{
    cart.push({...item, count: 1});
  }
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartUI();
}

function goCart(){
  window.location.href = "../cart.html";
}

/* INIT */
renderFeed();
renderSlider();
updateCartUI();

/* KATEGORIYA SAHIFASIDAGI INIT QISMI */
window.addEventListener("load", () => {
  const urlParams = new URLSearchParams(window.location.search);
  const startId = urlParams.get("id");

  if (startId) {
    setTimeout(() => {
      const target = document.getElementById(startId);
      if (target) {
        const yOffset = -110;
        const y = target.getBoundingClientRect().top + window.pageYOffset + yOffset;
        window.scrollTo({ top: y, behavior: "smooth" });

        const targetIndex = categories.findIndex(c => c.id === startId);
        if (targetIndex !== -1) {
          activeIndex = targetIndex;
          updateSlider();
        }
      }
    }, 300);
  }
});

// localStorage o'zgarishini kuzatish
window.addEventListener("storage", updateCartUI);
</script>

<!-- SAVATCHA TUGMASI -->
<div class="cart-btn" onclick="goCart()">
  <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="21" r="1"></circle>
    <circle cx="20" cy="21" r="1"></circle>
    <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"></path>
  </svg>
  <span id="cartCount" class="cart-count">0</span>
</div>

</body>
</html>
