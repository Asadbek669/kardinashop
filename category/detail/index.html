<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
}

.back{
  padding:15px;
  cursor:pointer;
  color:#00ff99;
}

img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.content{
  padding:15px;
}

.price{
  color:#00ff99;
  font-size:18px;
  margin-top:10px;
}

/* ORDER BUTTON */
.order-btn{
  position:fixed;
  bottom:0;
  width:100%;
  padding:15px;
  background:#00ff99;
  color:black;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#1c1c1c;
  padding:20px;
  border-radius:10px;
  width:80%;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

.send{
  background:#00ff99;
  padding:10px;
  text-align:center;
  cursor:pointer;
  border-radius:8px;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="back" onclick="history.back()">⬅ Orqaga</div>

<div id="app"></div>

<div class="order-btn" onclick="openModal()">Buyurtma berish</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Buyurtma</h3>
    <input type="text" id="phone" placeholder="Telefon raqam">
    <input type="number" id="count" placeholder="Soni">
    <div class="send" onclick="sendOrder()">Yuborish</div>
  </div>
</div>

<script src="../../data.js"></script>
<script>
const app = document.getElementById("app");

const url = new URL(window.location.href);
const catId = url.searchParams.get("cat");
const itemId = url.searchParams.get("id");

const category = categories.find(c => c.id === catId);
const item = category?.items.find(i => i.id === itemId);

if(!item){
  app.innerHTML = "<h2>Xatolik ❌</h2>";
}else{
  app.innerHTML = `
    <img src="${item.poster}">
    <div class="content">
      <h2>${item.name}</h2>
      <p>${item.desc}</p>
      <div class="price">${item.price}</div>
    </div>
  `;
}

/* MODAL */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

/* SEND ORDER */
function sendOrder(){
  const phone = document.getElementById("phone").value;
  const count = document.getElementById("count").value;

  if(!phone || !count){
    alert("Ma'lumotlarni to'ldiring");
    return;
  }

  const text = `
🛒 Yangi buyurtma!

📦 Mahsulot: ${item.name}
💰 Narx: ${item.price}
📄 Tavsif: ${item.desc}
🖼 Rasm: ${item.poster}

📊 Soni: ${count}
📞 Telefon: ${phone}
  `;

  const telegramUrl = `https://t.me/U2BEK_712?text=${encodeURIComponent(text)}`;

  window.open(telegramUrl, "_blank");
}
</script>

</body>
</html>
