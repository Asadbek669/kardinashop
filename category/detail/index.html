<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batafsil KARDINA</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
}

/* IMAGE */
img{
  width:100%;
  height:250px;
  object-fit:cover;
}

/* FULLSCREEN */
#fsImg{
  max-width:95%;
  max-height:95%;
  object-fit:contain;
  transform: scale(2);
}

/* COUNTER */
.counter{
  display:flex;
  align-items:center;
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
}

.counter button{
  width:40px;
  height:40px;
  border:none;
  background:#111;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}

.counter span{
  width:40px;
  text-align:center;
}

/* FLOAT CART */
.cart{
  position:fixed;
  bottom:80px;
  right:15px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#00ff99;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  color:black;
  cursor:pointer;
  z-index:999;
}

.cart span{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:#fff;
  font-size:12px;
  width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<!-- FULLSCREEN -->
<div id="fsModal" onclick="closeFullScreen()" style="
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:none;align-items:center;justify-content:center;z-index:9999;">
  <img id="fsImg">
</div>

<!-- BACK -->
<div onclick="history.back()" style="
position:fixed;top:10px;left:10px;
display:flex;align-items:center;gap:8px;
padding:8px 14px;border-radius:12px;
background:rgba(30,30,30,0.6);
backdrop-filter:blur(10px);
color:white;font-size:14px;
cursor:pointer;z-index:100;">
  ❮ Orqaga
</div>

<div id="app"></div>

<!-- FLOAT CART -->
<div onclick="goCart()" class="cart">
  <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="21" r="1"></circle>
    <circle cx="20" cy="21" r="1"></circle>
    <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"></path>
  </svg>
  <span id="cartCount">0</span>
</div>

<script src="../../data.js"></script>
<script>
const app = document.getElementById("app");

const url = new URL(window.location.href);
const catId = url.searchParams.get("cat");
const itemId = url.searchParams.get("id");

const category = categories.find(c => c.id === catId);
const item = category?.items.find(i => i.id === itemId);

/* RENDER */
if(!item){
  app.innerHTML = `
    <h2 style="
      text-align:center;
      margin-top:100px;
      color:#aaa;
    ">
      Topilmadi
    </h2>
  `;
}else{
  app.innerHTML = `
  
  <!-- TOP SECTION -->
  <div style="
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#0f0f0f;
    z-index:10;
  ">

    <!-- POSTER -->
    <div style="position:relative;">
      <img id="posterImg" src="${item.poster}" style="
        width:100%;
        height:220px;
        object-fit:cover;
      ">

      <!-- FULLSCREEN -->
      <div onclick="openFullScreen()" style="
        position:absolute;
        bottom:10px;
        right:10px;
        width:38px;
        height:38px;
        border-radius:10px;
        background:rgba(0,0,0,0.6);
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        color:#fff;
      ">
        ⛶
      </div>
    </div>

	<!-- INFO -->
	<div style="padding:12px 15px;">

	  <!-- NAME -->
	  <h2 style="
		margin:0;
		font-size:20px;
		font-weight:600;
		color:#fff;
	  ">
		${item.name}
	  </h2>

	  <!-- PRICE + BUTTON ROW -->
	  <div style="
		margin-top:12px;
		display:flex;
		align-items:center;
		justify-content:space-between;
	  ">

		<!-- PRICE -->
		<div style="
		  font-size:18px;
		  font-weight:700;
		  background:linear-gradient(90deg,#00ff99,#00c2ff);
		  -webkit-background-clip:text;
		  -webkit-text-fill-color:transparent;
		">
		  ${item.price}
		</div>

		<!-- PLUS / COUNTER -->
		<div style="display:flex; align-items:center; gap:10px;">

		  <!-- PLUS BUTTON -->
		  <button id="plusBtn" onclick="addOne()" style="
			width:45px;
			height:45px;
			background:#00ff99;
			border:none;
			border-radius:10px;
			font-size:22px;
			cursor:pointer;
			color:#000;
			font-weight:bold;
		  ">
			+
		  </button>

		  <!-- COUNTER BOX -->
		  <div id="counterBox" style="
			display:none;
			align-items:center;
			background:#1a1a1a;
			border-radius:10px;
			overflow:hidden;
		  ">

			<button onclick="changeCount(-1)" style="
			  width:40px;
			  height:40px;
			  background:#111;
			  color:#fff;
			  border:none;
			  font-size:18px;
			  cursor:pointer;
			">−</button>

			<span id="countText" style="
			  width:50px;
			  text-align:center;
			  font-size:16px;
			  color:#fff;
			">1</span>

			<button onclick="changeCount(1)" style="
			  width:40px;
			  height:40px;
			  background:#111;
			  color:#fff;
			  border:none;
			  font-size:18px;
			  cursor:pointer;
			">+</button>

		  </div>

		</div>
	  </div>
	</div>
  </div>

  <!-- CONTENT -->
  <div style="
    margin-top:300px;
    padding:15px;
  ">

    <div style="
      background:linear-gradient(145deg,#1a1a1a,#101010);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:16px;
      padding:16px;

      color:#d6d6d6;
      line-height:1.7;
      font-size:15px;
    ">
      ${item.desc}
    </div>

  </div>

  <!-- BOTTOM BUTTON -->
  <div onclick="goCart()" style="
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    padding:15px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(90deg,#00ff99,#00c2ff);
    color:black;
    z-index:20;
  ">
    Savatchaga o‘tish
  </div>
  `;
}

/* CART */
let currentCount = 0;

function addOne(){
  currentCount = 1;

  plusBtn.style.display="none";
  counterBox.style.display="flex";

  countText.innerText=currentCount;

  syncCart();
}

function changeCount(val){
  currentCount += val;

  if(currentCount <= 0){
    currentCount = 0;

    plusBtn.style.display="block";
    counterBox.style.display="none";

    removeFromCart();
    return;
  }

  countText.innerText = currentCount;

  syncCart();
}

function syncCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let exist = cart.find(i => i.id === item.id);

  if(exist){
    exist.count = currentCount;
  }else{
    cart.push({
      id: item.id,
      name: item.name,
      price: item.price,
      poster: item.poster,
      count: currentCount
    });
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartUI();
}

function removeFromCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart = cart.filter(i => i.id !== item.id);

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartUI();
}

function updateCartUI(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let total = 0;
  cart.forEach(i => total += i.count);

  document.getElementById("cartCount").innerText = total;
}

function initCounter(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let exist = cart.find(i => i.id === item.id);

  if(exist){
    currentCount = exist.count;

    plusBtn.style.display="none";
    counterBox.style.display="flex";
    countText.innerText = currentCount;
  }
}

/* FULLSCREEN */
function openFullScreen(){
  fsImg.src = posterImg.src;
  fsModal.style.display="flex";
}

function closeFullScreen(){
  fsModal.style.display="none";
}

/* NAV */
function goCart(){
  window.location.href = "../../cart.html";
}

/* INIT */
updateCartUI();
initCounter();
window.addEventListener("focus", updateCartUI);
</script>

</body>
</html>
