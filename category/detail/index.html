<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
}

.back{
  padding:15px;
  cursor:pointer;
  color:#00ff99;
}

img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.content{
  padding:15px;
}

.price{
  color:#00ff99;
  font-size:18px;
  margin-top:10px;
}

/* ORDER BUTTON */
.order-btn{
  position:fixed;
  bottom:0;
  width:100%;
  padding:15px;
  background:#00ff99;
  color:black;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#1c1c1c;
  padding:20px;
  border-radius:10px;
  width:80%;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

.send{
  background:#00ff99;
  padding:10px;
  text-align:center;
  cursor:pointer;
  border-radius:8px;
  color:black;
  font-weight:bold;
}
#fsImg{
  max-width:95%;
  max-height:95%;
  object-fit:contain;
  transform: scale(2); /* 👈 default zoom */
  transition: transform 0.3s ease;
}
</style>
</head>

<body>

<div id="fsModal" onclick="closeFullScreen()" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
">
  <img id="fsImg" style="
    max-width:95%;
    max-height:95%;
    object-fit:contain;
  ">
</div>

<div onclick="history.back()" style="
  position:fixed;
  top:10px;
  left:10px;
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 14px;
  border-radius:12px;
  background:rgba(30,30,30,0.6);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  font-size:14px;
  cursor:pointer;
  transition:0.2s;
  z-index:100;
">
  <span style="font-size:18px;">❮</span>
  <span>Orqaga</span>
</div>

<div id="app"></div>

<div class="order-btn" onclick="openModal()">Buyurtma berish</div>

<!-- MODAL -->
<div id="modal" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:999;
">

  <div style="
    position:relative;
    width:90%;
    max-width:340px;
    padding:22px;
    border-radius:18px;
    text-align:center;

    background:linear-gradient(145deg,#1c1c1c,#101010);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 15px 40px rgba(0,0,0,0.6);

    animation:pop 0.25s ease;
  ">

    <!-- CLOSE BUTTON -->
    <div onclick="document.getElementById('modal').style.display='none'" style="
      position:absolute;
      top:10px;
      right:10px;
      width:28px;
      height:28px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      background:rgba(255,255,255,0.08);
      color:#aaa;
      font-size:16px;
      transition:0.2s;
    " onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">
      ✕
    </div>

    <!-- TITLE -->
    <h3 style="
      margin-bottom:18px;
      font-size:17px;
      color:#e6e6e6;
      letter-spacing:0.5px;
    ">
      Buyurtma berish
    </h3>

    <!-- INPUT PHONE -->
    <input type="text" id="phone" placeholder="Telefon raqam" style="
      width:100%;
      padding:12px;
      margin:8px 0;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.06);
      background:#141414;
      color:#fff;
      outline:none;
      font-size:14px;
    ">

    <!-- INPUT COUNT -->
    <input type="number" id="count" placeholder="Soni" style="
      width:100%;
      padding:12px;
      margin:8px 0;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.06);
      background:#141414;
      color:#fff;
      outline:none;
      font-size:14px;
    ">

    <!-- BUTTON -->
    <div onclick="sendOrder()" style="
      margin-top:14px;
      padding:12px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      color:#000;

      background:linear-gradient(90deg,#00ff99,#00c2ff);
      transition:0.2s;
    " onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
      Yuborish
    </div>

  </div>
</div>

<style>
@keyframes pop{
  from{
    transform:scale(0.85);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}
</style>

<script src="../../data.js"></script>
<script>
const app = document.getElementById("app");

const url = new URL(window.location.href);
const catId = url.searchParams.get("cat");
const itemId = url.searchParams.get("id");

const category = categories.find(c => c.id === catId);
const item = category?.items.find(i => i.id === itemId);

if(!item){
  app.innerHTML = `
    <div style="
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      color:#aaa;
    ">
      <div style="font-size:40px;">⚠️</div>
      <h2 style="color:#fff;margin:8px 0 0;">Topilmadi</h2>
      <p style="font-size:13px;">Mahsulot mavjud emas</p>
    </div>
  `;
}else{
  app.innerHTML = `
  
  <!-- FIXED TOP -->
  <div style="
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:10;
    background:#0f0f0f;
  ">

	<div style="position:relative;">
	  <img id="posterImg" src="${item.poster}" style="
		width:100%;
		height:220px;
		object-fit:cover;
	  ">

	  <!-- FULLSCREEN BUTTON -->
	  <div onclick="openFullScreen()" style="
		position:absolute;
		bottom:10px;
		right:10px;
		width:38px;
		height:38px;
		border-radius:10px;
		background:rgba(0,0,0,0.6);
		display:flex;
		align-items:center;
		justify-content:center;
		cursor:pointer;
		font-size:18px;
		color:#fff;
		backdrop-filter:blur(6px);
	  ">
		⛶
	  </div>
	</div>

    <div style="
      padding:12px 15px;
    ">

	<h2 style="
	  margin:0;
	  font-size:20px;
	  color:#fff;
	  letter-spacing:0.3px;
	  font-weight:600;
	">
	  ${item.name}
	</h2>

	<div style="
	  margin-top:8px;
	  font-size:18px;
	  font-weight:700;
	  letter-spacing:0.5px;
	  background:linear-gradient(90deg,#00ff99,#00c2ff);
	  -webkit-background-clip:text;
	  -webkit-text-fill-color:transparent;
	  display:inline-block;
	">
	  ${item.price}
	</div>

    </div>
  </div>

  <!-- SCROLLABLE CONTENT -->
  <div style="
    margin-top:300px;
    padding:15px;
  ">

	<div style="
	  height:calc(100vh - 360px);
	  overflow-y:auto;
	  padding:16px;
	  border-radius:16px;
	  background:linear-gradient(145deg,#1a1a1a,#101010);
	  border:1px solid rgba(255,255,255,0.05);

	  color:#d6d6d6;
	  font-size:15px;
	  line-height:1.8;
	  letter-spacing:0.2px;

	  font-weight:400;

	  scroll-behavior:smooth;
	  -webkit-overflow-scrolling:touch;
	">
	  ${item.desc}
	</div>

  </div>

  <!-- FIXED BUTTON -->
  <div onclick="openModal()" style="
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    padding:15px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(90deg,#00ff99,#00c2ff);
    color:black;
    z-index:20;
  ">
    Buyurtma berish
  </div>

  `;
}

/* MODAL */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

/* SEND ORDER */
function sendOrder(){
  const phone = document.getElementById("phone").value;
  const count = document.getElementById("count").value;

  if(!phone || !count){
    alert("Ma'lumotlarni to'ldiring");
    return;
  }

  // 💰 PRICE ni numberga o‘tkazamiz
  const priceNumber = parseInt(item.price.replace(/\D/g, ""));

  // 💰 UMUMIY SUMMA
  const total = priceNumber * Number(count);

  // formatlash (700000 -> 700 000)
  const formattedTotal = total.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");

  const text = `
🛒 Yangi buyurtma!

📦 Mahsulot: ${item.name}
💰 Bir dona narx: ${item.price}
📊 Soni: ${count}

💵 Umumiy summa: ${formattedTotal} so'm

📞 Telefon: ${phone}
🖼 Rasm: ${item.poster}
  `;

  const telegramUrl = `https://t.me/U2BEK_712?text=${encodeURIComponent(text)}`;

  window.open(telegramUrl, "_blank");
}

function openFullScreen(){
  const img = document.getElementById("posterImg");
  const fsImg = document.getElementById("fsImg");

  fsImg.src = img.src;
  document.getElementById("fsModal").style.display = "flex";
}

function closeFullScreen(){
  document.getElementById("fsModal").style.display = "none";
}
</script>

</body>
</html>
